# ENTRO-AI ReadTheDocs Configuration
# Version: 2

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    pre_build:
      - pip install -e ".[docs]"
      - sphinx-build -b html docs/source docs/build/html -W

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
    - requirements: docs/requirements.txt

sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: true

formats:
  - epub
  - pdf
  - htmlzip

submodules:
  include: all
  recursive: true

search:
  ranking:
    entro_ai/core/*: 10
    entro_ai/edt_controller/*: 10
    entro_ai/coherence/*: 8
    docs/source/tutorials/*: 5
